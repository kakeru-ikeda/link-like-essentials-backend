type SectionActivation {
  section1: Boolean!
  section2: Boolean!
  section3: Boolean!
  section4: Boolean!
  section5: Boolean!
  sectionFever: Boolean!
}

type HeartCollectAnalysis {
  id: ID!
  cardId: Int
  accessoryId: Int
  sections: SectionActivation
  conditionDetail: JSON
  analyzedAt: DateTime
}

type UnDrawAnalysis {
  id: ID!
  cardId: Int
  accessoryId: Int
  sections: SectionActivation
  conditionDetail: JSON
  analyzedAt: DateTime
}

type TraitAnalysisResult {
  cardId: Int!
  heartCollect: HeartCollectAnalysis
  unDraw: UnDrawAnalysis
}

input TraitAnalysisInput {
  cardId: Int!
}

type Query {
  # 複数カードの特性分析データを一括取得
  traitAnalysisBatch(inputs: [TraitAnalysisInput!]!): [TraitAnalysisResult!]!
}
